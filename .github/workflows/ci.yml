name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-and-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install OS deps
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Install Python deps for upstream Forte deployment scripts
        run: |
          python -m pip install --upgrade pip
          python -m pip install eth-abi==5.1.0 python-dotenv==1.0.1

      - name: Install npm dependencies
        run: npm install --no-audit --no-fund

      - name: Install forge-std
        run: forge install foundry-rs/forge-std --no-git

      - name: Run Foundry tests
        run: npm test

      - name: Run integration rebuild
        run: npm run check:integration

      - name: Assert applied policy state
        run: npm run check:policy
